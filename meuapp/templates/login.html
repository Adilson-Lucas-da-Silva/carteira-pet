{% extends "base.html" %}
{% block title %}Login — Carteira PET{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-4">
  <div class="relative overflow-hidden shadow-2xl bg-white/95 backdrop-blur-sm rounded-2xl w-full max-w-md">

    <!-- Barra decorativa no topo do card -->
    <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-slate-200 via-slate-300 to-slate-200"></div>

    <div class="p-8 sm:p-10">

      <!-- Logo -->
      <div class="flex justify-center my-6 group">
        <div class="relative">
          <div class="absolute inset-0 bg-gradient-to-br from-slate-200 to-slate-300 rounded-full blur-xl opacity-30 group-hover:opacity-40 transition-opacity duration-300"></div>
          <img src="https://media.base44.com/images/public/69d05d6832b317d3bf25460a/85908382c_logo.png"
               alt="Carteira Pet logo"
               class="relative h-20 w-20 sm:h-24 sm:w-24 rounded-full object-cover shadow-lg ring-4 ring-white/50 group-hover:shadow-xl transition-all duration-300" />
        </div>
      </div>

      <!-- Título -->
      <div class="text-center space-y-1.5 mb-6">
        <h1 class="text-3xl font-bold text-slate-900">Bem-vindo</h1>
        <p class="text-slate-500 text-sm">Entre na sua conta para continuar</p>
      </div>

      <!-- Mensagem de erro -->
      {% if erro %}
      <div class="mb-4 px-4 py-3 rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm">
        {{ erro }}
      </div>
      {% endif %}

      <!-- Formulário -->
      <form method="POST" class="space-y-3">
        {% csrf_token %}

        <div class="space-y-1">
          <label class="text-sm text-slate-700">Login</label>
          <input type="text" name="login" placeholder="Seu login" required
            class="w-full h-12 bg-slate-50/50 border border-slate-200 rounded-xl px-4 text-sm placeholder:text-slate-400 focus:outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-400 transition-colors duration-200" />
        </div>

        <div class="space-y-1">
          <label class="text-sm text-slate-700">Senha</label>
          <input type="password" name="senha" placeholder="Sua senha" required
            class="w-full h-12 bg-slate-50/50 border border-slate-200 rounded-xl px-4 text-sm placeholder:text-slate-400 focus:outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-400 transition-colors duration-200" />
        </div>

        <div class="pt-2">
          <button type="submit"
            class="w-full bg-slate-900 text-white rounded-xl py-3 text-sm font-medium hover:bg-slate-800 shadow-sm transition-colors duration-150">
            Entrar
          </button>
        </div>
      </form>

      <!-- Link para cadastro -->
      <div class="mt-6 text-center">
        <span class="text-sm text-slate-500">Não tem uma conta? </span>
        <a href="{% url 'cadastro' %}" class="text-sm font-medium text-slate-900 hover:text-slate-700 transition-colors">
          Cadastre-se
        </a>
      </div>

    </div>
  </div>
</div>
{% endblock %}
