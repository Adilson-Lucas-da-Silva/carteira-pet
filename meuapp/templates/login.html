<!DOCTYPE html>
<html lang="pt-br">
{% load static %}

<head>
  <meta charset="UTF-8">
  <title>Carteira PET - Login</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #f8fafc, #e2e8f0);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    .navbar-custom {
      background-color: white;
      border-bottom: 1px solid #ddd;
    }

    .navbar-brand {
      font-weight: 600;
      font-size: 1.3rem;
      letter-spacing: 0.5px;
      color: #1e293b;
    }

    .pet-destaque {
      color: #2563eb;
      font-weight: 700;
    }

    .hero {
      background-color: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .cta-text {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #1e293b;
    }

    .subtitulo {
      font-size: 1.35rem;
      color: #2563eb;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .texto-descricao {
      color: #4b5563;
      line-height: 1.8;
      font-size: 1.05rem;
    }

    .card {
      border-radius: 15px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom px-4">
    <div class="container-fluid">

      <span class="navbar-brand">
        Carteira <span class="pet-destaque">PET</span>
      </span>

      <div class="ms-auto">
        <a href="#" class="btn btn-primary me-2">Cadastrar</a>
      </div>
    </div>
  </nav>

  <!-- Conteúdo principal -->
  <div class="container py-5">

    <h2 class="text-center mb-3 cta-text">
      Bem-vindo à Carteira PET 🐾
    </h2>

    <div class="hero text-center">

      <div class="row align-items-center">

        <!-- Gato esquerda -->
        <div class="col-md-3 d-none d-md-block">
          <img src="{% static 'imagens/gato.webp' %}" alt="Gato" class="img-fluid" style="max-width:120px;">
        </div>

        <!-- Texto central -->
        <div class="col-md-6">

          <p class="subtitulo">
            Gerencie a saúde do seu pet com facilidade
          </p>

          <p class="texto-descricao mb-4">
            Registre e acompanhe as vacinas em um só lugar, com organização, praticidade e segurança.
          </p>

        </div>

        <!-- Cachorro direita -->
        <div class="col-md-3 d-none d-md-block">
          <img src="{% static 'imagens/cachorro.webp' %}" alt="Cachorro" class="img-fluid" style="max-width:120px;">
        </div>

      </div>

    </div>

    <!-- Login -->
    <div class="row justify-content-center mt-4 mb-5">
      <div class="col-md-5">

        <div class="card shadow-sm p-4">

          {% if erro %}
          <div class="alert alert-danger text-center">
            {{ erro }}
          </div>
          {% endif %}

          <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label">Login:</label>
              <input type="text" name="login" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">Senha:</label>
              <input type="password" name="senha" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Entrar
            </button>
          </form>

        </div>

      </div>
    </div>

  </div>

</body>

</html>
