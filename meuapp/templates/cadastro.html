<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
</head>

<body>

  <h2>Cadastro do Tutor</h2>

  <form method="POST">
    {% csrf_token %}

    <h3>Dados do Tutor</h3>

    <label>Nome:</label><br>
    <input type="text" name="tutor" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Celular:</label><br>
    <input type="text" name="celular"><br><br>

    <label>Telefone:</label><br>
    <input type="text" name="telefone"><br><br>

    <label>Logradouro:</label><br>
    <input type="text" name="logradouro" required><br><br>

    <label>Número:</label><br>
    <input type="text" name="numero_logradouro"><br><br>

    <label>Complemento:</label><br>
    <input type="text" name="complemento"><br><br>

    <label>Bairro:</label><br>
    <input type="text" name="bairro" required><br><br>

    <label>Cidade:</label><br>
    <input type="text" name="cidade" required><br><br>

    <label>UF:</label><br>
    <input type="text" name="uf" maxlength="2" required><br><br>

    <label>CEP:</label><br>
    <input type="text" name="cep"><br><br>

    <h3>Dados de Acesso</h3>

    <label>Login:</label><br>
    <input type="text" name="login" required><br><br>

    <label>Senha:</label><br>
    <input type="password" name="senha" required><br><br>

    <button type="submit">Cadastrar</button>
  </form>

</body>

</html>
