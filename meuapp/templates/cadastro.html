<!DOCTYPE html>
<html lang="pt-br">
{% load static %}

<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #f8fafc, #e2e8f0);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    .navbar-custom {
      background-color: white;
      border-bottom: 1px solid #ddd;
    }

    .navbar-brand {
      font-weight: 600;
      font-size: 1.3rem;
      color: #1e293b;
    }

    .pet-destaque {
      color: #2563eb;
      font-weight: 700;
    }

    .card {
      border-radius: 15px;
    }

    .titulo {
      font-size: 2rem;
      font-weight: 700;
      color: #1e293b;
    }

    .subtitulo {
      font-size: 1.2rem;
      color: #2563eb;
      font-weight: 600;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom px-4">
    <div class="container-fluid">

      <span class="navbar-brand">
        Carteira <span class="pet-destaque">PET</span>
      </span>

      <!--<div class="ms-auto">
        <a href="#" class="btn btn-outline-primary">Login</a>
      </div>-->

    </div>
  </nav>

  <!-- Conteúdo -->
  <div class="container py-5">

    <div class="row justify-content-center">
      <div class="col-md-8">

        <div class="card shadow-sm p-4">

          <h2 class="text-center titulo mb-3">Cadastro do Tutor</h2>

          <form method="POST">
            {% csrf_token %}

            <!-- Dados do Tutor -->
            <h4 class="subtitulo">Dados do Tutor</h4>

            <div class="mb-3">
              <label>Nome:</label>
              <input type="text" name="tutor" class="form-control" required>
            </div>

            <div class="mb-3">
              <label>Email:</label>
              <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
              <label>Celular:</label>
              <input type="text" name="celular" class="form-control">
            </div>

            <div class="mb-3">
              <label>Telefone:</label>
              <input type="text" name="telefone" class="form-control">
            </div>

            <div class="mb-3">
              <label>Logradouro:</label>
              <input type="text" name="logradouro" class="form-control" required>
            </div>

            <div class="row">
              <div class="col-md-4 mb-3">
                <label>Número:</label>
                <input type="text" name="numero_logradouro" class="form-control">
              </div>

              <div class="col-md-8 mb-3">
                <label>Complemento:</label>
                <input type="text" name="complemento" class="form-control">
              </div>
            </div>

            <div class="mb-3">
              <label>Bairro:</label>
              <input type="text" name="bairro" class="form-control" required>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label>Cidade:</label>
                <input type="text" name="cidade" class="form-control" required>
              </div>

              <div class="col-md-2 mb-3">
                <label>UF:</label>
                <input type="text" name="uf" maxlength="2" class="form-control" required>
              </div>

              <div class="col-md-4 mb-3">
                <label>CEP:</label>
                <input type="text" name="cep" class="form-control">
              </div>
            </div>

            <!-- Dados de Acesso -->
            <h4 class="subtitulo">Dados de Acesso</h4>

            <div class="mb-3">
              <label>Login:</label>
              <input type="text" name="login" class="form-control" required>
            </div>

            <div class="mb-4">
              <label>Senha:</label>
              <input type="password" name="senha" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Cadastrar
            </button>

          </form>

        </div>

      </div>
    </div>

  </div>

</body>

</html>
