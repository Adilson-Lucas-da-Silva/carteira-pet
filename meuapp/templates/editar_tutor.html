<!DOCTYPE html>
<html lang="pt-br">


<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Detalhes do Tutor</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #f8fafc, #e2e8f0);
      min-height: 100vh;
    }

    .navbar-custom {
      background-color: white;
      border-bottom: 1px solid #ddd;
    }

    .card-custom {
      background-color: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .pet-img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 15px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom px-4">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">Carteira PET</span>

      <!-- Boão de sair no canto esquerdo da navbar-->
      <div class="ms-auto">
        <a href="{% url 'logout' %}" class="btn btn-primary me-2">Sair</a>
      </div>
    </div>
  </nav>

  <!-- Conteúdo principal -->
  <div class="container py-5">

    <!-- Dados do Tutor -->
    <div class="card-custom mb-5">
      <div class="row align-items-center">

        <!-- Foto -->
        <div class="col-md-4 text-center">
          {% if tutor.foto %}
          <img src="{{ tutor.foto.url }}" alt="Foto do Tutor" class="pet-img">
          {% else %}
          <img src="{% static 'imagens/user_full.webp' %}" alt="Foto padrão" class="pet-img">
          {% endif %}
        </div>

        <!-- Dados -->
        <div class="col-md-8">

          <form method="POST">
            {% csrf_token %}

            <label>Nome:</label>
            <input type="text" name="tutor" value="{{ tutor.tutor }}" class="form-control mb-2">

            <label>Email:</label>
            <input type="email" name="email" value="{{ tutor.email }}" class="form-control mb-2">

            <label>Celular:</label>
            <input type="text" name="celular" value="{{ tutor.celular }}" class="form-control mb-2">

            <label>Telefone:</label>
            <input type="text" name="telefone" value="{{ tutor.telefone }}" class="form-control mb-2">

            <hr>

            <h5>Endereço</h5>

            <label>Logradouro:</label>
            <input type="text" name="logradouro" value="{{ tutor.logradouro }}" class="form-control mb-2">

            <label>Número:</label>
            <input type="text" name="numero_logradouro" value="{{ tutor.numero_logradouro }}" class="form-control mb-2">

            <label>Complemento:</label>
            <input type="text" name="complemento" value="{{ tutor.complemento }}" class="form-control mb-2">

            <label>Bairro:</label>
            <input type="text" name="bairro" value="{{ tutor.bairro }}" class="form-control mb-2">

            <label>Cidade:</label>
            <input type="text" name="cidade" value="{{ tutor.cidade }}" class="form-control mb-2">

            <label>UF:</label>
            <input type="text" name="uf" value="{{ tutor.uf }}" class="form-control mb-2">

            <label>CEP:</label>
            <input type="text" name="cep" value="{{ tutor.cep }}" class="form-control mb-3">

            <button type="submit" class="btn btn-success">Salvar</button>
          </form>


        </div>
      </div>
      <!-- Botões Embaico -->
      <div class="d-flex justify-content-between mt-4">

        <!-- Botão Voltar -->
        <a href="{% url 'tela_inicial_apos_login' %}" class="btn btn-primary">
          Voltar
        </a>


      </div>
    </div>
  </div>
</body>

</html>
