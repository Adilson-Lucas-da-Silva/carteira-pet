<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>

<body>

  <h2>Login</h2>

  {% if erro %}
  <p style="color:red;">{{ erro }}</p>
  {% endif %}

  <form method="POST">
    {% csrf_token %}

    <label>Login:</label><br>
    <input type="text" name="login"><br><br>

    <label>Senha:</label><br>
    <input type="password" name="senha"><br><br>

    <button type="submit">Entrar</button>
  </form>

</body>

</html>
