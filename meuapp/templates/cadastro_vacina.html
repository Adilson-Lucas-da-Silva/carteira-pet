<!DOCTYPE html>
<html lang="pt-br">
{% load static %}

<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #f8fafc, #e2e8f0);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    .navbar-custom {
      background-color: white;
      border-bottom: 1px solid #ddd;
    }

    .navbar-brand {
      font-weight: 600;
      font-size: 1.3rem;
      color: #1e293b;
    }

    .pet-destaque {
      color: #2563eb;
      font-weight: 700;
    }

    .card {
      border-radius: 15px;
    }

    .titulo {
      font-size: 2rem;
      font-weight: 700;
      color: #1e293b;
    }

    .subtitulo {
      font-size: 1.2rem;
      color: #2563eb;
      font-weight: 600;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom px-4">
    <div class="container-fluid">

      <span class="navbar-brand">
        Carteira <span class="pet-destaque">PET</span>
      </span>
      <!-- Boão de sair no canto direito da navbar-->
      <div class="ms-auto">
        <a href="{% url 'logout' %}" class="btn btn-primary me-2">Sair</a>
      </div>
    </div>
  </nav>

  <!-- Conteúdo -->
  <div class="container py-5">

    <div class="row justify-content-center">
      <div class="col-md-8">

        <div class="card shadow-sm p-4">

          <h2 class="text-center titulo mb-3">Cadastro de Vacina</h2>

          <form method="POST">
            {% csrf_token %}

            <!-- Dados da Vacina -->
            <h4 class="subtitulo">Dados da Vacina</h4>

            <div class="mb-3">
              <label>Vacina:</label>
              <input type="text" name="vacina" class="form-control" required>
            </div>

            <div class="mb-3">
              <label>Data de Aplicação:</label>
              <input type="date" name="data_aplicacao" class="form-control" required>
            </div>

            <div class="mb-3">
              <label>Pet:</label>
              <select name="pet" class="form-control" required>
                <option value="">Selecione</option>
                {% for p in pets %}
                <option value="{{ p.id_pet }}">{{ p.pet }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label>Veterinário:</label>
              <select name="veterinario" class="form-control" required>
                <option value="">Selecione</option>
                {% for v in veterinarios %}
                <option value="{{ v.id_veterinario }}">{{ v.veterinario }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label>Observações:</label>
              <textarea name="obs_vacina" class="form-control"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Cadastrar
            </button>

            <a href="{% url 'tela_inicial' %}" class="btn btn-danger w-100">
              Cancelar
            </a>

          </form>

        </div>

      </div>
    </div>

  </div>

</body>

</html>
