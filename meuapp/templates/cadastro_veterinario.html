<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Veterinário</title>
</head>

<body>

    <h2>Cadastrar Veterinário</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Nome:</label><br>
        <input type="text" name="veterinario"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Celular:</label><br>
        <input type="text" name="celular"><br><br>

        <label>Telefone:</label><br>
        <input type="text" name="telefone"><br><br>

        <label>Logradouro:</label><br>
        <input type="text" name="logradouro"><br><br>

        <label>Número:</label><br>
        <input type="text" name="numero_endereco"><br><br>

        <label>Bairro:</label><br>
        <input type="text" name="bairro"><br><br>

        <label>Cidade:</label><br>
        <input type="text" name="cidade"><br><br>

        <label>UF:</label><br>
        <input type="text" name="uf"><br><br>

        <label>CEP:</label><br>
        <input type="text" name="cep"><br><br>

        <button type="submit">Salvar</button>
    </form>

    <br>
    <a href="{% url 'tela_inicial_apos_login' %}">Voltar</a>

</body>

</html>
